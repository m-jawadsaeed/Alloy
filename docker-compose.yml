services:
  postgres:
    image: postgres:17

    container_name: alloy-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: alloy

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: alloy-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: